---
#
#

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    image: dev-sandbox:latest
    stdin_open: true
    tty: true
    volumes:
      - ${INPUT_DIR:-./input}:/input:rw,Z

      - ${HOME}/.codex:/root/.codex:rw
      - ${HOME}/.copilot:/root/.copilot:rw
      - ${HOME}/.gemini:/root/.gemini:rw

      - ${HOME}/.aws/sso/cache:/root/.aws/sso/cache:rw
      - ${HOME}/.kiro:/root/.kiro:rw
      - ${HOME}/.local/share/kiro-cli:/root/.local/share/kiro-cli:rw
      
      - ${HOME}/.local/share/opencode:/root/.local/share/opencode:rw

      - ${HOME}/.qwen:/root/.qwen:rw
      
      - npm-global:/root/.npm:Z
      - gradle-cache:/root/.gradle:Z
      - maven-cache:/root/.m2:Z
      - android-cache:/root/.android:Z

    environment:
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk

    working_dir: /input

volumes:
  npm-global:
  gradle-cache:
  maven-cache:
  android-cache:
