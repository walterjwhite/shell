name: Publish (FreeBSD)

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 12:00 AM UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'debug'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  conf_log_level: ${{ inputs.debug == true && '0' || '2' }}
  BUILD_PLATFORM: freebsd-amd64

jobs:

  #
  publish-freebsd:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'walterjwhite' }}
    steps:
      - uses: actions/checkout@v4

      - name: configure SSH deploy key (host)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APP_REGISTRY_DEPLOY_KEY }}" > ~/.ssh/app_registry_deploy_key
          chmod 600 ~/.ssh/app_registry_deploy_key
          cat >> ~/.ssh/config <<EOF
          Host github.com
            IdentityFile ~/.ssh/app_registry_deploy_key
            StrictHostKeyChecking no
          EOF

      - name: build and publish apps in FreeBSD VM
        uses: cross-platform-actions/action@v1.2.0
        with:
          operating_system: freebsd
          architecture: x86-64
          version: '15.0'
          shell: bash
          run: |
            cd app/install
            ./build -build-platforms=${{ env.BUILD_PLATFORM }}

            ./app-publish

            cd ../..
            sudo env conf_log_level=${{ env.conf_log_level }} ./app-install install

            cd app
            app-build -build-platforms=${{ env.BUILD_PLATFORM }}

            app-publish
