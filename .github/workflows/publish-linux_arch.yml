name: Publish (Arch Linux)

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 12:00 AM UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'debug'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  conf_log_level: ${{ inputs.debug == true && '0' || '2' }}
  BUILD_PLATFORM: arch-amd64
  APP_REGISTRY_REPO: git@github.com:walterjwhite/app-registry.git

jobs:

  publish-cachyos-arch:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'walterjwhite' }}
    container:
      image: archlinux:latest   # swap for cachyos/cachyos if a public image is published
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: bootstrap pacman dependencies
        run: pacman -Syu --noconfirm git openssh curl

      - name: configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APP_REGISTRY_DEPLOY_KEY }}" > ~/.ssh/app_registry_deploy_key
          chmod 600 ~/.ssh/app_registry_deploy_key
          cat >> ~/.ssh/config <<EOF
          Host github.com
            IdentityFile ~/.ssh/app_registry_deploy_key
            StrictHostKeyChecking no
          EOF

      - name: build install app
        run: |
          cd app/install
          ./build -build-platforms=${{ env.BUILD_PLATFORM }}

      - name: publish install app
        run: |
          cd app/install
          ./app-publish

      - name: install 'install' app
        run: |
          conf_log_level=${{ env.conf_log_level }} ./app-install install

      - name: build all apps
        run: |
          cd app
          app-build -build-platforms=${{ env.BUILD_PLATFORM }}

      - name: publish all apps
        run: |
          cd app
          app-publish
