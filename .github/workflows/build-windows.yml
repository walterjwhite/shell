name: Build (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug:
        description: 'debug'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  conf_log_level: ${{ inputs.debug == true && '0' || '2' }}

jobs:

  build-windows:
    runs-on: windows-latest   # windows-latest == Windows Server 2025 / Win11-equivalent
    if: ${{ github.actor == 'walterjwhite' }}
    steps:
      - uses: actions/checkout@v4

      - name: install Git Bash
        shell: pwsh
        run: |
          winget install --id Git.Git --exact --silent --accept-source-agreements --accept-package-agreements
          echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: test installing apps
        shell: bash
        run: |
          curl -sSL \
            https://raw.githubusercontent.com/walterjwhite/app-registry/refs/heads/main/install/Windows/setup/bin/app-install \
            -o /tmp/app-install
          chmod +x /tmp/app-install

          export conf_log_level=${{ env.conf_log_level }}

          /tmp/app-install install

          for app in $(find app -type d -maxdepth 2 ! -name install | sort -uV); do
            app_name=$(basename $app)

            echo "installing $app"
            conf_log_level=${{ env.conf_log_level }} /tmp/app-install $app_name || {
              printf 'failed to install %s\n' "$app_name"
            }
          done
