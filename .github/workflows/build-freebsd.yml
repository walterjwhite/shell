name: Build (FreeBSD)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug:
        description: 'debug'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  conf_log_level: ${{ inputs.debug == true && '0' || '2' }}

jobs:

  build-freebsd:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'walterjwhite' }}
    steps:
      - uses: actions/checkout@v4

      - name: set up FreeBSD VM and test installing apps
        uses: cross-platform-actions/action@v1.2.0
        with:
          operating_system: freebsd
          architecture: x86-64
          version: '15.0'
          shell: bash
          run: |
            curl -sSL \
              https://raw.githubusercontent.com/walterjwhite/app-registry/refs/heads/main/install/FreeBSD/setup/bin/app-install \
              -o /tmp/app-install
            chmod +x /tmp/app-install
            sudo mv /tmp/app-install /usr/local/bin

            sudo env conf_log_level=${{ env.conf_log_level }} /usr/local/bin/app-install install

            for app in $(find app -type d -maxdepth 2 ! -name install | sort -uV); do
              app_name=$(basename $app)

              echo "installing $app"
              conf_log_level=${{ env.conf_log_level }} /usr/local/bin/app-install $app_name || {
                printf 'failed to install %s\n' "$app_name"
              }
            done
