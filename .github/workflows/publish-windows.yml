name: Publish (Windows)

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 12:00 AM UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'debug'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  conf_log_level: ${{ inputs.debug == true && '0' || '2' }}
  BUILD_PLATFORM: windows-amd64
  APP_REGISTRY_REPO: git@github.com:walterjwhite/app-registry.git

jobs:

  publish-windows:
    runs-on: windows-latest
    if: ${{ github.actor == 'walterjwhite' }}
    steps:
      - uses: actions/checkout@v4

      - name: install Git Bash
        shell: pwsh
        run: |
          winget install --id Git.Git --exact --silent --accept-source-agreements --accept-package-agreements
          echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: configure SSH deploy key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APP_REGISTRY_DEPLOY_KEY }}" > ~/.ssh/app_registry_deploy_key
          chmod 600 ~/.ssh/app_registry_deploy_key
          cat >> ~/.ssh/config <<EOF
          Host github.com
            IdentityFile ~/.ssh/app_registry_deploy_key
            StrictHostKeyChecking no
          EOF

      - name: build install app
        shell: bash
        run: |
          cd app/install
          ./build -build-platforms=${{ env.BUILD_PLATFORM }}

      - name: publish install app
        shell: bash
        run: |
          cd app/install
          ./app-publish

      - name: install 'install' app
        shell: bash
        run: |
          export conf_log_level=${{ env.conf_log_level }}
          ./app-install install

      - name: build all apps
        shell: bash
        run: |
          cd app
          app-build -build-platforms=${{ env.BUILD_PLATFORM }}

      - name: publish all apps
        shell: bash
        run: |
          cd app
          app-publish
